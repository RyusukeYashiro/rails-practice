services:
  pracitce:
    build: .
    command: bash -lc "bash ./entrypoint.sh bundle exec rails server -b 0.0.0.0 -p 3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "1"
      DATABASE_URL: mysql2://root:root@db:3306/app_development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle

  db:
    image: mysql:8.0.37
    command: --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_development
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  db-data:
  bundle:
